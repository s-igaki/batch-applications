name: Daily Real Estate Crawl

on:
  schedule:
    # 06:00 JST = 21:00 UTC (previous day)
    - cron: "0 9,21 * * *"
    # 18:00 JST = 09:00 UTC
    # - cron: "0 9 * * *"
    # - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-realestate-crawler:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run real estate crawler
        env:
          PYTHONUNBUFFERED: "1"
          LINE_CLIENT_ID: ${{ secrets.LINE_CLIENT_ID }}
          LINE_CLIENT_SECRET: ${{ secrets.LINE_CLIENT_SECRET }}
        run: python ./realestate_crawler.py

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add realestate_data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update real estate crawl data"
          git push
